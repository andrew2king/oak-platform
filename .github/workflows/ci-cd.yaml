name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '17'
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

jobs:
  # 业务中台构建
  build-biz-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./biz-platform
        run: mvn clean package -DskipTests

      - name: Run tests
        working-directory: ./biz-platform
        run: mvn test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./biz-platform/**/target/site/jacoco/jacoco.xml

  # 技术中台构建
  build-tech-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Gateway
        working-directory: ./tech-platform/gateway
        run: go build -o gateway main.go

      - name: Build Message Center
        working-directory: ./tech-platform/message
        run: go build -o message main.go

      - name: Run Go tests
        working-directory: ./tech-platform
        run: go test ./... -v

  # 前端构建
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Build
        working-directory: ./frontend
        run: pnpm build

      - name: Lint
        working-directory: ./frontend
        run: pnpm lint

  # Docker镜像构建
  docker-build:
    needs: [build-biz-platform, build-tech-platform, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Product Service
        uses: docker/build-push-action@v5
        with:
          context: ./biz-platform/product
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/oak-product-service:latest

  # K8s部署
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        working-directory: ./infra/k8s
        run: |
          kubectl apply -f product-service.yaml